services:
  telop-output:
    build:
      context: .
      args:
        TELOP_OUTPUT_PORT: "${PORT:-8030}"
    container_name: telop_output
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8030}:${PORT:-8030}"
    volumes:
      - "./config:/app/config"
      - "./assets:/app/assets"
      - "./logs:/app/logs"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
