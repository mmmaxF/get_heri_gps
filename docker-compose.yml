services:
  get-heri-gps:
    build: .
    container_name: get_heri_gps
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      HOST: "0.0.0.0"
      PORT: "8010"
      SAMPLE_RATE: "48000"
      INPUT_DEVICE: "hw:2,0"
      INPUT_CHANNELS: "2"
      GPS_CHANNEL: "2"
      OUTPUT_CSV: "/app/output/gps_positions.csv"
      REVERSE_GEOCODER_URL: "http://reverse-geocoder:8020/api/position"
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - "audio"
    volumes:
      - "./output:/app/output"

  reverse-geocoder:
    build: ./reverse_geocoder
    container_name: reverse_geocoder
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      HOST: "0.0.0.0"
      PORT: "8020"
      GEOCODER_AUTO_UPDATE: "1"
      GEOCODER_UPDATE_DAYS: "30"
      GEOCODER_DATA_URL: "https://nlftp.mlit.go.jp/ksj/gml/data/N03/N03-2026/N03-20260101_56_GML.zip"
      GEOCODER_DB_PATH: "/app/data/admin_area.sqlite"
      GEOCODER_OUTPUT_CSV: "/app/output/geocoded_positions.csv"
    volumes:
      - "./reverse_geocoder/data:/app/data"
      - "./reverse_geocoder/output:/app/output"
