services:
  get-heri-gps:
    build:
      context: ./gps_receiver
      args:
        APP_PORT: "${GPS_RECEIVER_PORT:-8010}"
    container_name: get_heri_gps
    restart: unless-stopped
    env_file:
      - "${GPS_RECEIVER_ENV_FILE:-./gps_receiver/.env}"
    ports:
      - "${GPS_RECEIVER_PORT:-8010}:${GPS_RECEIVER_PORT:-8010}"
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - "audio"
    volumes:
      - "${HOST_GPS_OUTPUT_DIR:-./gps_receiver/output}:/app/output"
      - "${HOST_GPS_LOG_DIR:-./gps_receiver/logs}:/app/logs"
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"

  gps-demodulator:
    build:
      context: ./gps_receiver
      args:
        APP_PORT: "${GPS_RECEIVER_PORT:-8010}"
    profiles:
      - tools
    env_file:
      - "${GPS_RECEIVER_ENV_FILE:-./gps_receiver/.env}"
    command:
      - "sh"
      - "-c"
      - 'python demodulate_gps.py "$${GPS_DEMOD_INPUT_DIR:-/app/input}" --channel "$${GPS_CHANNEL:-2}" --output "$${GPS_DEMOD_OUTPUT_CSV:-/app/output/demodulated_gps.csv}"'
    volumes:
      - "${HOST_GPS_INPUT_DIR:-./gps_receiver/input}:/app/input:ro"
      - "${HOST_GPS_OUTPUT_DIR:-./gps_receiver/output}:/app/output"
      - "${HOST_GPS_LOG_DIR:-./gps_receiver/logs}:/app/logs"
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"

  reverse-geocoder:
    build:
      context: ./reverse_geocoder
      args:
        REVERSE_GEOCODER_PORT: "${REVERSE_GEOCODER_PORT:-8020}"
    container_name: reverse_geocoder
    restart: unless-stopped
    env_file:
      - "${REVERSE_GEOCODER_ENV_FILE:-./reverse_geocoder/.env}"
    ports:
      - "${REVERSE_GEOCODER_PORT:-8020}:${REVERSE_GEOCODER_PORT:-8020}"
    volumes:
      - "${HOST_GEOCODER_DATA_DIR:-./reverse_geocoder/data}:/app/data"
      - "${HOST_GEOCODER_OUTPUT_DIR:-./reverse_geocoder/output}:/app/output"
      - "${HOST_GEOCODER_LOG_DIR:-./reverse_geocoder/logs}:/app/logs"
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
