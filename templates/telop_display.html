<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>テロップV出力</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      img {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: fill;
        background: #000;
      }

      button {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 2;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 6px;
        padding: 10px 14px;
        color: #fff;
        background: rgba(0, 0, 0, 0.72);
        font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      body.fullscreen-ready button {
        display: none;
      }
    </style>
  </head>
  <body>
    <img id="telopImage" alt="">
    <button id="fullscreenBtn" type="button">全画面開始</button>
    <script>
      const image = document.getElementById("telopImage");
      const button = document.getElementById("fullscreenBtn");

      function refresh() {
        image.src = `/api/telop/preview/v.png?t=${Date.now()}`;
      }

      button.addEventListener("click", async () => {
        try {
          await document.documentElement.requestFullscreen();
          document.body.classList.add("fullscreen-ready");
        } catch (e) {
          button.textContent = "全画面にできません";
        }
      });

      refresh();
      setInterval(refresh, 1000);
    </script>
  </body>
</html>
