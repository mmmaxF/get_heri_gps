<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ヘリGPS取得</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">SDI AUDIO GPS</p>
          <h1>ヘリGPS取得</h1>
        </div>
        <div class="run-pill" id="runStatus">停止中</div>
      </header>

      <section class="hero">
        <div class="latest-main">
          <span class="label">最新位置</span>
          <div class="coord-row">
            <div class="place-cell">
              <span>地名</span>
              <strong id="latestPlace">-</strong>
            </div>
            <div>
              <span>緯度</span>
              <strong id="latestLat">-</strong>
            </div>
            <div>
              <span>経度</span>
              <strong id="latestLon">-</strong>
            </div>
            <div>
              <span>高度</span>
              <strong id="latestAlt">-</strong>
            </div>
          </div>
          <div class="latest-time" id="latestTime">まだ受信していません</div>
        </div>
        <div class="actions">
          <button id="startBtn" class="primary">開始</button>
          <button id="stopBtn">停止</button>
          <a class="button" href="/api/download">CSVを開く</a>
        </div>
      </section>

      <section class="setup">
        <div class="section-head">
          <h2>入力設定</h2>
          <span id="errorText"></span>
        </div>

        <select id="mode" class="hidden-select">
          <option value="command" selected>command</option>
        </select>

        <div class="quick-grid">
          <label class="device-field">
            <span>入力デバイス</span>
            <select id="input_device">
              <option value="hw:2,0">AJA U-TAP (hw:2,0)</option>
            </select>
          </label>
          <label>
            <span>GPS音声チャンネル</span>
            <select id="gps_channel">
              <option value="1">CH1</option>
              <option value="2" selected>CH2</option>
              <option value="3">CH3</option>
              <option value="4">CH4</option>
              <option value="5">CH5</option>
              <option value="6">CH6</option>
              <option value="7">CH7</option>
              <option value="8">CH8</option>
            </select>
          </label>
        </div>

        <details class="advanced">
          <summary>詳細設定</summary>
          <div class="advanced-grid">
            <label>
              <span>入力チャンネル数</span>
              <input id="input_channels" type="number" min="1" max="16" value="2">
            </label>
            <label class="wide">
              <span>テスト用RAWディレクトリ</span>
              <input id="test_capture_dir" type="text" value="../audio_capture/20260613_132355">
            </label>
            <label class="wide">
              <span>CSV保存先</span>
              <input id="output_csv" type="text" value="./output/gps_positions.csv">
            </label>
            <label class="wide">
              <span>逆ジオコーダーURL</span>
              <input id="reverse_geocoder_url" type="text" value="http://reverse-geocoder:8020/api/position">
            </label>
            <label class="wide">
              <span>自動生成された入力コマンド</span>
              <input id="input_command" type="text" value="arecord -D hw:2,0 -f S16_LE -r 48000 -c 2 -t raw">
            </label>
            <button id="saveBtn" type="button">設定を反映</button>
          </div>
        </details>
      </section>

      <section class="metrics">
        <div>
          <span>取得件数</span>
          <strong id="decoded">0</strong>
        </div>
        <div>
          <span>選択CH</span>
          <strong id="channel">CH2</strong>
        </div>
        <div>
          <span>入力サンプル</span>
          <strong id="samples">0</strong>
        </div>
        <div>
          <span>CSV</span>
          <strong id="csvPath">./output/gps_positions.csv</strong>
        </div>
        <div>
          <span>地名変換</span>
          <strong id="geocodeStatus">未接続</strong>
        </div>
      </section>

      <section class="telop">
        <div class="section-head">
          <h2>テロップ出力</h2>
          <span id="telopError"></span>
        </div>

        <div class="telop-grid">
          <label>
            <span>V出力</span>
            <select id="telop_v_output"></select>
          </label>
          <label>
            <span>Key出力</span>
            <select id="telop_key_output"></select>
          </label>
          <label>
            <span>解像度</span>
            <select id="telop_resolution">
              <option value="1920x1080">1920x1080</option>
              <option value="1280x720">1280x720</option>
            </select>
          </label>
          <label>
            <span>フレームレート</span>
            <select id="telop_frame_rate">
              <option value="59.94i">59.94i</option>
              <option value="59.94p">59.94p</option>
              <option value="29.97p">29.97p</option>
              <option value="50i">50i</option>
              <option value="50p">50p</option>
              <option value="25p">25p</option>
            </select>
          </label>
          <label>
            <span>ピクセル形式</span>
            <select id="telop_pixel_format">
              <option value="yuv8">8bit YUV</option>
              <option value="yuv10">10bit YUV</option>
              <option value="bgra">BGRA</option>
              <option value="rgba">RGBA</option>
            </select>
          </label>
          <label>
            <span>Key形式</span>
            <select id="telop_key_mode">
              <option value="matte">白黒マット</option>
              <option value="luma">ルミナンスKey</option>
              <option value="alpha">アルファKey</option>
            </select>
          </label>
          <label>
            <span>フォント</span>
            <select id="telop_font_family"></select>
          </label>
          <label>
            <span>文字揃え</span>
            <select id="telop_text_align">
              <option value="left">左寄せ</option>
              <option value="center">中央</option>
              <option value="right">右寄せ</option>
            </select>
          </label>
          <label>
            <span>フォントサイズ</span>
            <input id="telop_font_size" type="number" min="12" max="240" value="72">
          </label>
          <label>
            <span>文字色</span>
            <input id="telop_text_color" type="color" value="#ffffff">
          </label>
          <label>
            <span>縁取り色</span>
            <input id="telop_stroke_color" type="color" value="#000000">
          </label>
          <label>
            <span>縁取り幅</span>
            <input id="telop_stroke_width" type="number" min="0" max="30" value="6">
          </label>
          <label>
            <span>Keyマット濃度</span>
            <input id="telop_key_background_opacity" type="range" min="0" max="100" value="35">
            <small id="telop_key_background_opacity_value">35%</small>
          </label>
        </div>

        <div class="telop-actions">
          <button id="telopApplyBtn" type="button">テロップ設定を反映</button>
          <button id="telopStartBtn" type="button" class="primary">テロップ開始</button>
          <button id="telopStopBtn" type="button">テロップ停止</button>
          <span id="telopStatus">待機中</span>
        </div>

        <div class="preview-grid">
          <div>
            <div class="preview-title">Vプレビュー</div>
            <div class="preview-stage" id="telopStage">
              <img id="telopPreviewV" alt="V preview">
              <div id="telopBox"></div>
            </div>
          </div>
          <div>
            <div class="preview-title">Keyプレビュー</div>
            <div class="preview-stage">
              <img id="telopPreviewKey" alt="Key preview">
            </div>
          </div>
        </div>
      </section>

      <section class="log">
        <div class="section-head">
          <h2>受信履歴</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時刻</th>
                <th>緯度</th>
                <th>経度</th>
                <th>高度</th>
                <th>地名</th>
                <th>入力</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr class="empty-row"><td colspan="6">受信待ち</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
